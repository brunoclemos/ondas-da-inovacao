<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 200" fill="none">
  <!-- top bars (3 ascending) -->
  <g fill="#0F2BFF">
    <rect x="170" y="6"  width="80" height="11" transform="skewX(-12)"/>
    <rect x="160" y="24" width="100" height="11" transform="skewX(-12)"/>
    <rect x="150" y="42" width="120" height="11" transform="skewX(-12)"/>
  </g>
  <!-- main SEBRAE text -->
  <text x="180" y="125" text-anchor="middle"
        font-family="'Inter', Arial, sans-serif" font-size="80" font-weight="900"
        font-style="italic" letter-spacing="2" fill="#0F2BFF">SEBRAE</text>
  <!-- bottom bars (3 descending) -->
  <g fill="#0F2BFF">
    <rect x="150" y="148" width="120" height="11" transform="skewX(-12)"/>
    <rect x="160" y="166" width="100" height="11" transform="skewX(-12)"/>
    <rect x="170" y="184" width="80"  height="11" transform="skewX(-12)"/>
  </g>
</svg>
