    <!-- circuit dots left -->
    <circle cx="6"  cy="78"  r="5" fill="#5B6BE8"/>
    <circle cx="22" cy="78"  r="4" fill="#5B6BE8"/>
    <line x1="11" y1="78" x2="40" y2="78" stroke="#5B6BE8" stroke-width="3" stroke-linecap="round"/>
    <circle cx="6"  cy="100" r="4" fill="#7B3FE4"/>
    <line x1="11" y1="100" x2="42" y2="100" stroke="#7B3FE4" stroke-width="3" stroke-linecap="round"/>
    <!-- circuit dots right -->
    <circle cx="160" cy="60" r="4" fill="#2BB3F0"/>
    <circle cx="160" cy="120" r="4" fill="#2BB3F0"/>
  </g>
  <!-- text -->
  <g transform="translate(210,80)">
    <text x="0" y="0" font-family="'Inter', sans-serif" font-size="38" font-weight="800" letter-spacing="6" fill="#7B3FE4">ONDAS DA</text>
    <text x="0" y="50" font-family="'Inter', sans-serif" font-size="38" font-weight="800" letter-spacing="6" fill="#7B3FE4">INOVAÇÃO</text>
  </g>
