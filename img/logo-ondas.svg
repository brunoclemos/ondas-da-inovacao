<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 220" fill="none">
  <defs>
    <linearGradient id="ondasGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B3FE4"/>
      <stop offset="55%" stop-color="#5B6BE8"/>
      <stop offset="100%" stop-color="#2BB3F0"/>
    </linearGradient>
  </defs>
  <!-- Wave / O symbol -->
  <g transform="translate(20,30)">
    <!-- main wave shape -->
    <path d="M50 80
             C 50 35, 95 25, 130 45
             C 155 60, 160 90, 145 115
             C 130 140, 95 145, 70 130
             C 50 118, 45 100, 55 85
             C 65 70, 90 65, 105 78
             C 115 87, 115 100, 105 108"
